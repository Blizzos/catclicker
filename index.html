<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Cat Clicker</title>
        <link rel="stylesheet" href="style.css">
    </head>
<body>

    <div id="game">
        <div id="cat-area">
            <img id="cat" src="images/grey.jpg" alt="cat">
        </div>

        <div id="stats">
            <p id="pet-count">Pets: 0</p>
            <p id="multiplier">Pets per sec: 0</p>
        </div>

        <div id="shop">
            <h2>Shop</h2>
            <button id="buy-catsitter">
                Catsitter - 50 pets
            </button>
            <p id="catsitter-count">Catsitters: 0</p>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
